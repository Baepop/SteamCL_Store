<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamCL — Preview Regalos</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--neon:#00d4ff;--neon-glow:0 0 8px #00d4ff,0 0 24px #00d4ff55;--dark:#060a10;--dark2:#0c1420;--dark3:#111c2e;--card:#0e1928;--border:#1a3050;--text:#c8dff0;--text-dim:#5a7a99;--green:#00ff88;--orange:#ff9500;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;padding:24px 16px 40px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:700px;margin:0 auto;position:relative;z-index:1;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:2px;}
.logo span{color:var(--neon);}
.badge{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--neon);font-size:0.7rem;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;text-transform:uppercase;}

/* CONTROLS */
.controls-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}
.ctrl-title{font-size:0.72rem;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-bottom:14px;}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.ctrl-group{display:flex;flex-direction:column;gap:6px;}
.ctrl-label{font-size:0.78rem;color:var(--text-dim);letter-spacing:1px;}
.ctrl-input{background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;letter-spacing:1px;width:160px;}
.ctrl-input:focus{border-color:var(--neon);}
.ctrl-btn{background:var(--neon);color:#060a10;border:none;padding:9px 20px;border-radius:8px;font-family:'Orbitron',monospace;font-weight:700;font-size:0.75rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.ctrl-btn:hover{background:#fff;box-shadow:var(--neon-glow);}
.ctrl-btn.secondary{background:var(--dark3);color:var(--text-dim);border:1px solid var(--border);}
.ctrl-btn.secondary:hover{border-color:var(--neon);color:var(--neon);background:var(--dark3);box-shadow:none;}

/* RANGE */
.range-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text-dim);letter-spacing:3px;font-size:0.88rem;text-transform:uppercase;}
.dot{display:inline-block;animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

/* SINGLE RESULT */
.result-card{background:var(--card);border:1px solid var(--neon);border-radius:14px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:0 0 30px rgba(0,212,255,0.1);}
.result-img{width:70px;height:105px;object-fit:cover;border-radius:8px;border:1px solid var(--border);flex-shrink:0;}
.result-img-ph{width:70px;height:105px;background:var(--dark3);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
.result-info{}
.result-date-lbl{font-size:0.68rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;}
.result-date-val{font-family:'Orbitron',monospace;font-size:0.88rem;color:var(--neon);margin-bottom:8px;}
.result-game{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3;}
.result-copy{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.result-copy:hover{border-color:var(--neon);color:var(--neon);}

/* RANGE TABLE */
.range-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.range-title{font-size:0.72rem;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;}
.copy-all-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.copy-all-btn:hover{border-color:var(--neon);color:var(--neon);}
.range-table{width:100%;border-collapse:collapse;}
.range-table th{font-size:0.68rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.range-table td{padding:10px 12px;border-bottom:1px solid rgba(26,48,80,0.5);font-size:0.9rem;vertical-align:middle;}
.range-table tr:last-child td{border-bottom:none;}
.range-table tr:hover td{background:rgba(0,212,255,0.04);}
.td-date{font-family:'Orbitron',monospace;font-size:0.75rem;color:var(--text-dim);white-space:nowrap;}
.td-day{color:var(--neon);font-weight:600;font-size:0.78rem;}
.td-thumb{width:32px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.td-thumb-ph{width:32px;height:48px;background:var(--dark3);border-radius:4px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:0.9rem;}
.td-game{font-weight:600;color:#fff;}
.td-copy{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.td-copy:hover{border-color:var(--neon);color:var(--neon);}
.today-row td{background:rgba(0,212,255,0.05);}
.today-badge{background:var(--neon);color:#060a10;font-size:0.6rem;font-weight:900;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark2);border:1px solid var(--neon);color:#fff;padding:10px 20px;border-radius:10px;font-size:0.88rem;letter-spacing:1px;z-index:999;box-shadow:0 0 20px rgba(0,212,255,0.2);white-space:nowrap;pointer-events:none;}

/* ERROR */
.error-msg{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:14px 18px;color:#ff4d6d;font-size:0.88rem;letter-spacing:1px;margin-bottom:16px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,80%,100%{opacity:1}40%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="logo">STEAM<span>CL</span></div>
      <div style="font-size:0.68rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;">Store · Chile</div>
    </div>
    <div class="badge">🎁 Preview Regalos</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-card">
    <div class="ctrl-title">Consultar regalo por fecha</div>
    <div class="ctrl-row">
      <div class="ctrl-group">
        <div class="ctrl-label">Fecha específica</div>
        <input type="date" class="ctrl-input" id="dateInput">
      </div>
      <button class="ctrl-btn" onclick="lookupSingle()">Ver regalo</button>
      <button class="ctrl-btn secondary" onclick="lookupToday()">Hoy</button>
    </div>

    <div class="range-row">
      <div class="ctrl-group">
        <div class="ctrl-label">Desde</div>
        <input type="date" class="ctrl-input" id="rangeFrom">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Hasta</div>
        <input type="date" class="ctrl-input" id="rangeTo">
      </div>
      <button class="ctrl-btn" onclick="lookupRange()">Ver semana/rango</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
const SHEET_ID = '1pSrjAXJoX6rJR-sazsBGWCqAPb3sOI75Z7hAEeRrLRM';
const SHEET_NAME = 'Hoja1';
let pool = []; // juegos disponibles (availType === 'ok')

// ── Init: precargar fechas y cargar catálogo ──
window.addEventListener('load', () => {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  document.getElementById('dateInput').value = fmt(today);
  document.getElementById('rangeFrom').value = fmt(today);
  const nextWeek = new Date(today);
  nextWeek.setDate(today.getDate() + 6);
  document.getElementById('rangeTo').value = fmt(nextWeek);
  loadCatalog();
});

async function loadCatalog() {
  showOutput(`<div class="loading">Cargando catálogo<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>`);
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Catálogo vacío');

    const headers = rows[0].map(h => h.trim().toLowerCase());
    const dispIdx = headers.findIndex(h => h.includes('disponib'));
    const nameIdx = headers.findIndex(h => h.includes('juego') || h.includes('nombre'));
    const imgIdx  = headers.findIndex(h => h.includes('imagen') || h.includes('image') || h.includes('img'));

    const all = rows.slice(1).filter(r => r[nameIdx]?.trim()).map(r => ({
      name: r[nameIdx].trim(),
      image: imgIdx >= 0 && r[imgIdx] ? r[imgIdx].trim() : '',
      availType: getAvailType(dispIdx >= 0 && r[dispIdx] ? r[dispIdx].trim() : 'DISPONIBLE')
    }));

    pool = all.filter(g => g.availType === 'ok');
    showOutput(`<div class="loading" style="color:var(--green)">✅ ${pool.length} juegos disponibles cargados — elige una fecha</div>`);
  } catch(e) {
    showOutput(`<div class="error-msg">❌ No se pudo cargar el catálogo: ${e.message}<br>Verifica que el Sheet sea público.</div>`);
  }
}

function getAvailType(avail) {
  const a = avail.toUpperCase();
  if (a.includes('NO DISP') || a === 'NO DISPONIBLE') return 'no';
  if (a.includes('CUPO')) return 'cupo';
  if (a.includes('INSTA')) return 'instalar';
  return 'ok';
}

// Mismo algoritmo que la página principal (Mulberry32)
function seededRandom(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function computeGift(dateStr) {
  if (!pool.length) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const seed = y * 10000 + m * 100 + d;
  const rand = seededRandom(seed);
  const shuffled = [...pool].sort(() => rand() - 0.5);
  return shuffled[0];
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return { day: days[date.getDay()], short: `${d} ${months[m-1]} ${y}`, full: `${days[date.getDay()]} ${d} de ${['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][m-1]} ${y}` };
}

function isToday(dateStr) {
  return dateStr === new Date().toISOString().slice(0,10);
}

function lookupToday() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('dateInput').value = today;
  lookupSingle();
}

function lookupSingle() {
  const dateStr = document.getElementById('dateInput').value;
  if (!dateStr) return;
  if (!pool.length) { showOutput(`<div class="error-msg">Catálogo no cargado. Espera un momento y reintenta.</div>`); return; }

  const game = computeGift(dateStr);
  if (!game) return;
  const fmt = formatDate(dateStr);
  const todayBadge = isToday(dateStr) ? `<span class="today-badge">HOY</span>` : '';
  const igText = `Hola, muy buenos días! Les comparto el juego de rotación del dia de hoy♥\n\n🎁 ${game.name}`;

  showOutput(`
    <div class="result-card" style="animation:fadeUp 0.4s forwards">
      ${game.image
        ? `<img class="result-img" src="${game.image}" alt="${game.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="result-img-ph" ${game.image ? 'style="display:none"' : ''}>🎮</div>
      <div class="result-info">
        <div class="result-date-lbl">🎁 Regalo del día</div>
        <div class="result-date-val">${fmt.full} ${todayBadge}</div>
        <div class="result-game">${game.name}</div>
        <button class="result-copy" onclick="copyText(${JSON.stringify(igText)}, this)">
          📋 Copiar texto para historia de Instagram
        </button>
      </div>
    </div>
    <div style="background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:0.88rem;color:var(--text-dim);line-height:1.7;">
      <div style="font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;color:var(--text-dim)">Texto para la historia:</div>
      <div style="color:var(--text);font-size:0.95rem;">${igText.replace(/\n/g,'<br>')}</div>
    </div>
  `);
}

function lookupRange() {
  const fromStr = document.getElementById('rangeFrom').value;
  const toStr   = document.getElementById('rangeTo').value;
  if (!fromStr || !toStr) return;
  if (!pool.length) { showOutput(`<div class="error-msg">Catálogo no cargado.</div>`); return; }

  const from = new Date(fromStr + 'T12:00:00');
  const to   = new Date(toStr   + 'T12:00:00');
  if (from > to) { showOutput(`<div class="error-msg">La fecha "desde" debe ser anterior a "hasta".</div>`); return; }

  const maxDays = 90;
  const days = [];
  const cur = new Date(from);
  while (cur <= to && days.length < maxDays) {
    days.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate() + 1);
  }

  const rows = days.map(d => {
    const game = computeGift(d);
    const fmt = formatDate(d);
    const todayBadge = isToday(d) ? `<span class="today-badge">HOY</span>` : '';
    const igText = `Hola, muy buenos días! Les comparto el juego de rotación del dia de hoy♥\n\n🎁 ${game.name}`;
    return `
      <tr class="${isToday(d)?'today-row':''}">
        <td class="td-date">${fmt.short}${todayBadge}</td>
        <td class="td-day">${fmt.day}</td>
        <td>${game.image
          ? `<img class="td-thumb" src="${game.image}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">`
          : ''}<span class="td-thumb-ph" ${game.image?'style="display:none"':''}>🎮</span></td>
        <td class="td-game">${game.name}</td>
        <td><button class="td-copy" onclick="copyText(${JSON.stringify(igText)}, this)">📋 Copiar</button></td>
      </tr>`;
  }).join('');

  const allTexts = days.map(d => {
    const game = computeGift(d);
    const fmt = formatDate(d);
    return `📅 ${fmt.full}\n🎁 ${game.name}\n📝 Hola, muy buenos días! Les comparto el juego de rotación del dia de hoy♥`;
  }).join('\n\n---\n\n');

  showOutput(`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;">
      <div class="range-header">
        <div class="range-title">📅 ${days.length} días — ${formatDate(fromStr).short} → ${formatDate(toStr).short}</div>
        <button class="copy-all-btn" onclick="copyText(${JSON.stringify(allTexts)}, this)">📋 Copiar todo</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="range-table">
          <thead><tr>
            <th>Fecha</th><th>Día</th><th></th><th>Juego de regalo</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `);
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    rows.push(cols.map(c => c.replace(/^"|"$/g,'').trim()));
  }
  return rows;
}

function showOutput(html) {
  document.getElementById('output').innerHTML = html;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅ Copiado';
    setTimeout(() => btn.textContent = orig, 2000);
    showToast('✅ Texto copiado');
  }).catch(() => showToast('❌ No se pudo copiar'));
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
